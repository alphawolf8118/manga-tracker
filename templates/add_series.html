<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Series</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
</head>

<script>
document.addEventListener('DOMContentLoaded', function() {
  new Choices('#tags-select', {
    removeItemButton: true,
    searchEnabled: true,
    placeholderValue: "Select or type tags...",
  });
});
</script>

<body class="bg-gray-100 text-gray-800 font-sans">

  <div class="max-w-xl mx-auto mt-10 p-6 bg-white rounded shadow">
    <h1 class="text-2xl font-bold mb-6 text-center">➕ Add New Series</h1>

    <form method="post" class="space-y-4">
      <div>
        <label for="title" class="block font-medium">Title:</label>
        <input type="text" name="title" id="title" required
               class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="type" class="block font-medium">Type of Book:</label>
        <select name="type" id="type" required
                class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Select a type</option>
          <option value="Manga">Manga</option>
          <option value="Light Novel">Light Novel</option>
          <option value="Manhwa">Manhwa</option>
          <option value="Webtoon">Webtoon</option>
          <option value="Other">Other</option>
        </select>
      </div>      

      <div>
        <label for="publisher" class="block font-medium">Publisher:</label>
        <select name="publisher" id="publisher" required
                class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Select a publisher</option>
          <option value="Seven Seas">Seven Seas</option>
          <option value="Yen Press">Yen Press</option>
          <option value="VIZ Media">VIZ Media</option>
          <option value="Kodansha">Kodansha</option>
          <option value="J-Novel Club">J-Novel Club</option>
          <option value="Square Enix">Square Enix</option>
          <option value="Dark Horse">Dark Horse</option>
          <option value="One Peace Books">One Peace Books</option>
          <option value="Cross Infinite World">Cross Infinite World</option>
          <option value="KaitenBooks">KaitenBooks</option>
          <option value="Other">Other</option>
        </select>
      </div>      

      <div>
        <label for="status" class="block font-medium">Status:</label>
        <select name="status" id="status" required
                class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="Collecting">Collecting</option>
          <option value="Completed">Completed</option>
          <option value="Interested">Interested</option>
          <option value="On Hold">On Hold</option>
        </select>
      </div>

      <div>
        <label for="total_volumes" class="block font-medium">Total Volumes (optional):</label>
        <input type="text" name="total_volumes" id="total_volumes"
               class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Base Price Input -->
      <div>
        <label for="base_price" class="block font-medium">Base Price (optional):</label>
        <input type="text" name="base_price" id="base_price"
               class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="e.g. 12.99">
      </div>

      <!-- Series URL Input -->
      <div>
        <label for="series-url" class="block font-medium">Series URL:</label>
        <input type="text" name="url" id="url"
               class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="Enter the URL of the series">
      </div>

      <div class="flex justify-between items-center mt-6">
        <a href="{{ url_for('index') }}" class="text-blue-600 hover:underline">← Back</a>
        <button type="submit"
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
          Save
        </button>
      </div>
    </form>
  </div>

</body>
</html>
